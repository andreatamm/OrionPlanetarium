<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakt</title>
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="navbar">
      <img
        src="assets/icons/logo icon sm w-txt bk bg v2.svg"
        alt="Orion Planetarium"
        class="logo"
      />
      <nav class="nav">
        <ul class="nav-links">
          <li><a href="index.html">Avaleht</a></li>
          <li><a href="programs.html">Programmid</a></li>
          <li><a href="contact.html">Kontakt</a></li>
        </ul>
        <a href="tickets.html" class="nav-btn">Osta pilet</a>
      </nav>
    </header>

    <section class="contact-section">
      <div class="container">
        <h2 class="contact-title">Võta meiega ühendust!</h2>
        <div class="contact-wrapper">
          <div class="contact-info">
            <div class="contact-item">
              <img src="assets/icons/location.svg" alt="" />
              <div>
                <p>Orion Planetarium</p>
                <p>Linnutee tn 14</p>
                <p>10101 Kosmoselinn, Eesti</p>
              </div>
            </div>
            <div class="contact-item">
              <img src="assets/icons/mail.svg" alt="" />
              <p>orion@planetaarium.ee</p>
            </div>
            <div class="contact-item">
              <img src="assets/icons/phone.svg" alt="" />
              <p>+372 1234 56789</p>
            </div>
            <div class="social-section">
              <h3>Sotsiaalmeedia</h3>
              <div class="social-icons-contact">
                <a href="#">
                  <img src="assets/icons/youtube.svg" alt="YouTube" />
                </a>
                <a href="#">
                  <img src="assets/icons/facebook.svg" alt="Facebook" />
                </a>
                <a href="#">
                  <img src="assets/icons/twitter.svg" alt="Twitter" />
                </a>
                <a href="#">
                  <img src="assets/icons/instagram.svg" alt="Instagram" />
                </a>
              </div>
            </div>
          </div>
          <div class="contact-form-card">
            <form>
              <label for="name">Sinu nimi</label>
              <input id="name" type="text" placeholder="Sinu nimi" required />
              <label for="email">Sinu e-post</label>
              <input
                id="email"
                type="email"
                placeholder="Sinu e-post"
                required
              />
              <label for="message">Sõnum</label>
              <textarea
                id="message"
                placeholder="Sinu sõnum"
                required
              ></textarea>
              <button type="submit">Saada</button>
            </form>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-menu">
        <a href="index.html">Avaleht</a>
        <span>|</span>
        <a href="programs.html">Programmid</a>
        <span>|</span>
        <a href="tickets.html">Piletid</a>
        <span>|</span>
        <a href="contact.html">Kontakt</a>
      </div>
      <div class="social-icons">
        <a href="contact.html">
          <img src="assets/icons/youtube.svg" alt="YouTube" />
        </a>
        <a href="contact.html">
          <img src="assets/icons/facebook.svg" alt="Facebook" />
        </a>
        <a href="contact.html">
          <img src="assets/icons/twitter.svg" alt="Twitter" />
        </a>
        <a href="contact.html">
          <img src="assets/icons/instagram.svg" alt="Instagram" />
        </a>
      </div>
      <hr />
      <p class="copyright">© 2026 Orion Planetarium. All rights reserved</p>
    </footer>
  </body>
</html>
